<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>

    <style>
        body{
            font-family:Arial;
            background:#f5f5f5;
        }

        .box{
            width:500px;
            margin:50px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        input, textarea{
            width:100%;
            padding:10px;
            margin:10px 0;
        }

        button{
            width:100%;
            padding:12px;
            background:green;
            color:white;
            border:none;
            border-radius:5px;
        }
    </style>

</head>

<body>

<div class="box">

<h2>Checkout</h2>

<h3>Total Amount: ₹ {{ total }}</h3>

<form method="POST">

{% csrf_token %}

<input type="text" name="name" placeholder="Full Name" required>

<input type="email" name="email" placeholder="Email" required>

<input type="text" name="phone" placeholder="Phone Number" required>

<textarea name="address" placeholder="Delivery Address" required></textarea>

<button>Place Order</button>

</form>

</div>

</body>
</html>
