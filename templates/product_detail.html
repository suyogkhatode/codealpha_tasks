<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ product.name }} | TechKart</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f5f5f5;
        }

        nav{
            background:#222;
            color:white;
            padding:20px 40px;
        }

        nav h1{
            font-size:32px;
        }

        .container{
            width:90%;
            margin:50px auto;
        }

        .product-box{
            display:flex;
            gap:40px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 5px 15px rgba(0,0,0,.2);
        }

        .image{
            flex:1;
            text-align:center;
        }

        .image img{
            width:100%;
            max-width:400px;
            height:400px;
            object-fit:cover;
            border-radius:10px;
        }

        .details{
            flex:1;
        }

        .details h2{
            font-size:38px;
            margin-bottom:20px;
        }

        .price{
            color:green;
            font-size:32px;
            margin-bottom:20px;
        }

        .details p{
            font-size:18px;
            line-height:28px;
            margin-bottom:30px;
            color:#555;
        }

        .btn{
            display:inline-block;
            text-decoration:none;
            background:#007BFF;
            color:white;
            padding:12px 25px;
            border-radius:6px;
            margin-right:10px;
            transition:.3s;
        }

        .btn:hover{
            background:#0056b3;
        }

        .back{
            background:#555;
        }

        .back:hover{
            background:#333;
        }
    </style>
</head>

<body>

<nav>
    <h1>🛒 TechKart</h1>
</nav>

<div class="container">

    <div class="product-box">

        <div class="image">
            {% if product.image %}
                <img src="{{ product.image.url }}" alt="{{ product.name }}">
            {% endif %}
        </div>

        <div class="details">

            <h2>{{ product.name }}</h2>

            <div class="price">
                ₹ {{ product.price }}
            </div>

            <p>
                {{ product.description }}
            </p>

            <a href="{% url 'add_to_cart' product.id %}" class="btn">
                🛒 Add to Cart
            </a>

            <a href="/" class="btn back">
                ⬅ Back to Home
            </a>

        </div>

    </div>

</div>

</body>
</html>
