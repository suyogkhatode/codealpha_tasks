<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
}

.box{
    width:350px;
    margin:80px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    width:100%;
    padding:12px;
    background:green;
    color:white;
    border:none;
    border-radius:5px;
}

</style>

</head>

<body>

<div class="box">

<h2>Login</h2>

<form method="POST">

{% csrf_token %}

{{ form.as_p }}

<button>Login</button>

</form>

</div>

</body>

</html>
