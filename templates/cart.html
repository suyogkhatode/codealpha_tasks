<!DOCTYPE html>
<html>
<head>
    <title>Shopping Cart</title>

    <style>
        body{
            font-family:Arial;
            background:#f5f5f5;
            margin:40px;
        }

        h1{
            margin-bottom:20px;
        }

        table{
            width:100%;
            background:white;
            border-collapse:collapse;
        }

        th,td{
            border:1px solid #ddd;
            padding:15px;
            text-align:center;
        }

        th{
            background:#007BFF;
            color:white;
        }

        a{
            text-decoration:none;
            padding:8px 12px;
            border-radius:5px;
            color:white;
            margin:2px;
        }

        .plus{
            background:green;
        }

        .minus{
            background:orange;
        }

        .delete{
            background:red;
        }

        .shop{
            background:#007BFF;
            display:inline-block;
            margin-top:20px;
        }

        .total{
            font-size:24px;
            margin-top:20px;
            color:green;
        }
    </style>

</head>

<body>

<h1>🛒 Shopping Cart</h1>

<table>

<tr>
    <th>Product</th>
    <th>Price</th>
    <th>Quantity</th>
    <th>Total</th>
    <th>Action</th>
</tr>

{% for item in items %}

<tr>

<td>{{ item.product.name }}</td>

<td>₹ {{ item.product.price }}</td>

<td>{{ item.quantity }}</td>

<td>₹ {{ item.total_price }}</td>

<td>

<a class="plus" href="{% url 'increase_quantity' item.id %}">+</a>

<a class="minus" href="{% url 'decrease_quantity' item.id %}">-</a>

<a class="delete" href="{% url 'remove_item' item.id %}">Remove</a>

</td>

</tr>

{% endfor %}

</table>

<div class="total">

Grand Total : ₹ {{ total }}

</div>

<a class="shop" href="/">⬅ Continue Shopping</a>
<br><br>

<a class="shop" href="/orders/checkout/">
    Proceed to Checkout
</a>

</body>
</html>
